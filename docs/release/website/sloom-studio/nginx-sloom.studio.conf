server {
    server_name sloom.studio www.sloom.studio;

    root /var/www/sloom.studio/html;
    index index.html;

    access_log /var/log/nginx/sloom.studio.access.log;
    error_log /var/log/nginx/sloom.studio.error.log;

    # Hide nginx version in headers/error pages
    server_tokens off;

    # ── Security headers (apply to every response; keep them only here at server
    #    level — adding add_header inside any location block would drop these) ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;                       # no clickjacking / framing
    add_header Strict-Transport-Security "max-age=31536000" always; # force HTTPS for a year
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), browsing-topics=()" always;
    # Static site: only same-origin resources load; inline <style>/<script> are ours.
    # Card data is handled on Stripe's own pages, so nothing sensitive runs here.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self' https://buy.stripe.com; upgrade-insecure-requests" always;

    # Never serve hidden files/dirs (.git, .omc, .env, etc.)
    location ~ /\. { deny all; }

    # Don't expose source/helper files
    location = /verify-site.mjs { return 404; }
    location = /nginx-sloom.studio.conf { return 404; }
    location = /deploy.sh { return 404; }
    location = /README.md { return 404; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sloom.studio/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sloom.studio/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.sloom.studio) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = sloom.studio) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name sloom.studio www.sloom.studio;
    return 404; # managed by Certbot
}
