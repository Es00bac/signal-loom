server {
    server_name sloom.studio www.sloom.studio;

    root /var/www/sloom.studio/html;
    index index.html;

    access_log /var/log/nginx/sloom.studio.access.log;
    error_log /var/log/nginx/sloom.studio.error.log;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /verify-site.mjs {
        return 404;
    }

    location = /nginx-sloom.studio.conf {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sloom.studio/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sloom.studio/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.sloom.studio) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = sloom.studio) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name sloom.studio www.sloom.studio;
    return 404; # managed by Certbot
}
