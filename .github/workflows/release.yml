name: Build & Release (all platforms)

# One workflow that builds every platform and, on a version tag, attaches the
# installers to a single GitHub Release. Supersedes mac-build.yml.
#
#   • Push a tag  v0.9.11  → builds Windows/Linux/macOS/Android and publishes a Release.
#   • Or run manually from the Actions tab (workflow_dispatch) to get artifacts
#     without cutting a release.
#
# Everything here is UNSIGNED for now. Signing is added later by setting secrets,
# without touching the build logic:
#   • Windows : distribute via the Microsoft Store (it signs), or add a cert.
#   • macOS   : CSC_LINK / CSC_KEY_PASSWORD / APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD
#   • Android : ANDROID_KEYSTORE_BASE64 + keystore.properties for a signed release AAB.

on:
  workflow_dispatch: {}
  push:
    tags: ['v*.*.*']

permissions:
  contents: write            # the release step needs this on tag builds

jobs:
  # ---- Windows, Linux, macOS via electron-builder on native runners ----
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            ebargs: --linux AppImage deb
          - os: windows-latest
            platform: windows
            ebargs: --win nsis
          - os: macos-14
            platform: mac
            ebargs: --mac dmg zip --x64 --arm64 -c.mac.icon=build/icons/icon.png
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build renderer + main
        run: npm run build
      - name: Package installers (${{ matrix.platform }}, unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'   # skip mac signing when no cert is present
        run: npx electron-builder ${{ matrix.ebargs }} --publish never
      - name: List artifacts
        shell: bash
        run: ls -lh release/ || dir release
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sloom-studio-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
      - name: Attach to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb

  # ---- Android (Capacitor + Gradle). Debug APK for now; release AAB once a keystore secret exists. ----
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install dependencies
        run: npm ci
      - name: Build web + sync + assemble APK
        run: npm run build:android
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sloom-studio-android-apk
          if-no-files-found: error
          path: android/app/build/outputs/apk/**/*.apk
      - name: Attach APK to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/**/*.apk
