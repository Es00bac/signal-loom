name: Build macOS (.dmg)

# Signal Loom ships Windows + Linux installers from a Linux box, but a macOS .dmg
# has to be packaged on macOS. This runs electron-builder on a GitHub-hosted mac
# runner and produces UNSIGNED .dmg installers for both Intel (x64) and Apple
# Silicon (arm64). Unsigned = users right-click → Open the first time to get past
# Gatekeeper. Signing/notarization (needs a paid Apple Developer ID) can be added
# later by setting the CSC_LINK / CSC_KEY_PASSWORD / APPLE_ID secrets.

on:
  workflow_dispatch: {}          # manual: Actions tab → this workflow → "Run workflow"
  push:
    branches: [ci/mac-build]     # first push of this branch builds immediately
    tags: ['v*.*.*']             # release tags also produce (and attach) a .dmg

permissions:
  contents: write                # only used by the release step on tag builds

jobs:
  mac-dmg:
    runs-on: macos-14            # Apple Silicon runner; can cross-package x64 too
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main (tsc -b + vite)
        run: npm run build

      - name: Package unsigned .dmg (Intel + Apple Silicon)
        # CSC_IDENTITY_AUTO_DISCOVERY=false makes electron-builder skip code
        # signing when no cert is present, instead of failing the build.
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        # --publish never: electron-builder auto-publishes when it detects CI, which needs a
        # token and isn't what we want here (the release step below handles tag builds).
        run: npx electron-builder --mac dmg --x64 --arm64 --publish never -c.mac.icon=build/icons/icon.png

      - name: List built artifacts
        run: ls -lh release/*.dmg

      - name: Upload .dmg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signal-loom-macos-dmg
          path: release/*.dmg
          if-no-files-found: error

      - name: Attach .dmg to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
